<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 多益每日閱讀圖書館</title>
    <!-- 引入 PapaParse 用於解析雲端 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #003366;
            --sidebar-bg: #ffffff;
            --main-bg: #f4f7f9;
            --accent-color: #27ae60;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--main-bg);
            color: var(--text-color);
        }

        /* 左側選單欄 */
        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
        }

        .article-list {
            flex: 1;
            overflow-y: auto;
        }

        .article-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }

        .article-item:hover {
            background-color: #f0f4f8;
        }

        .article-item.active {
            background-color: #e3f2fd;
            border-left: 6px solid var(--primary-color);
        }

        .item-date {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 5px;
        }

        .item-title {
            font-weight: bold;
            font-size: 0.95em;
            line-height: 1.4;
        }

        /* 右側主內容區 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .content-container {
            width: 100%;
            max-width: 850px;
        }

        .welcome-screen {
            text-align: center;
            margin-top: 150px;
            color: #999;
        }

        .article-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        h1#displayTitle {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .reading-text {
            font-size: 18px;
            line-height: 1.8;
            margin: 25px 0;
            white-space: pre-line;
            text-align: justify;
        }

        .translation-box {
            display: none;
            background: #fdfdfd;
            border-top: 1px dashed #ccc;
            margin-top: 25px;
            padding-top: 25px;
            color: #666;
            font-size: 16px;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .toggle-btn {
            background: #eee;
            color: #555;
            padding: 8px 16px;
            font-size: 14px;
        }

        .toggle-btn:hover { background: #ddd; }

        /* 測驗區塊 */
        .quiz-section {
            margin-top: 40px;
        }

        .quiz-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .question-text {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 15px;
            display: block;
        }

        .option-label {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover {
            background-color: #f8fbff;
            border-color: #d0e3ff;
        }

        .option-label input {
            margin-right: 12px;
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: white;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            margin-top: 20px;
        }

        .submit-btn:hover { background-color: #219150; }

        .feedback {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>
<body>

    <!-- 左側清單 -->
    <div class="sidebar">
        <div class="sidebar-header">多益 AI 練習圖書館</div>
        <div class="article-list" id="articleList">
            <div style="padding:20px; color:#999;">正在連線雲端資料庫...</div>
        </div>
    </div>

    <!-- 右側主內容 -->
    <div class="main-content">
        <div id="welcomeScreen" class="welcome-screen">
            <img src="https://cdn-icons-png.flaticon.com/512/3389/3389081.png" width="100" style="opacity: 0.2; margin-bottom: 20px;"><br>
            請從左側選擇一篇文章開始練習
        </div>

        <div id="articleDisplay" class="content-container" style="display: none;">
            <div class="article-card">
                <h1 id="displayTitle"></h1>
                <div id="displayEn" class="reading-text"></div>
                
                <button class="btn toggle-btn" onclick="toggleZh()">顯示/隱藏中文翻譯</button>
                <div id="displayZh" class="translation-box"></div>
            </div>

            <div id="quizArea" class="quiz-section"></div>
            
            <button class="btn submit-btn" onclick="processQuiz()">提交測驗答案</button>
            <div id="finalScore" style="text-align:center; font-size: 24px; font-weight:bold; margin: 40px 0; color: var(--accent-color);"></div>
        </div>
    </div>

<script>
    // 您的 Google Sheet CSV 網址
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzWz-mVKNwOE69ahdiCvZAm5OIp8nG0Hd2CmLyziUzLyoD5WsyXwLC-J7bHrJUda54ymzCw6GZikka/pub?output=csv';
    
    let articles = [];
    let currentQuizData = null;

    // 1. 初始化並獲取 CSV 資料
    function init() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                // 過濾掉空行，並將最新的排在前面
                articles = results.data.filter(row => row.JSON_Data).reverse();
                renderSidebar();
            },
            error: function() {
                document.getElementById('articleList').innerHTML = '<div style="padding:20px; color:red;">連線失敗，請檢查 CSV 網址。</div>';
            }
        });
    }

    // 2. 渲染左側清單
    function renderSidebar() {
        const listEl = document.getElementById('articleList');
        if (articles.length === 0) {
            listEl.innerHTML = '<div style="padding:20px; color:#999;">目前資料庫尚無文章。</div>';
            return;
        }

        listEl.innerHTML = articles.map((art, index) => `
            <div class="article-item" onclick="selectArticle(${index})" id="item-${index}">
                <div class="item-date">${art.Date || 'No Date'}</div>
                <div class="item-title">${art.Title || 'Untitled Article'}</div>
            </div>
        `).join('');
    }

    // 3. 點擊清單加載文章
    function selectArticle(index) {
        // 更新 UI 選擇狀態
        document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${index}`).classList.add('active');
        
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('articleDisplay').style.display = 'block';
        document.getElementById('finalScore').innerText = '';

        const rawData = articles[index].JSON_Data;
        
        try {
            // 處理 JSON 格式：去除 Gemini 有時會加上的 Markdown 標籤
            let cleanJson = rawData.trim();
            if (cleanJson.startsWith('```')) {
                cleanJson = cleanJson.replace(/```json|```/g, '');
            }
            
            const data = JSON.parse(cleanJson);
            currentQuizData = data;

            // 填入文章內容
            document.getElementById('displayTitle').innerText = data.title;
            document.getElementById('displayEn').innerText = data.contentEn;
            document.getElementById('displayZh').innerText = data.contentZh;
            document.getElementById('displayZh').style.display = 'none';

            // 生成題目
            let quizHtml = data.questions.map((q, qIndex) => `
                <div class="quiz-card">
                    <span class="question-text">Q${qIndex + 1}. ${q.q}</span>
                    ${q.options.map((opt, oIndex) => `
                        <label class="option-label">
                            <input type="radio" name="q${qIndex}" value="${oIndex}">
                            (${String.fromCharCode(65 + oIndex)}) ${opt}
                        </label>
                    `).join('')}
                    <div id="feedback-${qIndex}" class="feedback"></div>
                </div>
            `).join('');
            document.getElementById('quizArea').innerHTML = quizHtml;

            // 回到頂部
            document.querySelector('.main-content').scrollTop = 0;

        } catch (err) {
            console.error("JSON 解析錯誤", err);
            alert("此文章資料格式有誤，無法解析。");
        }
    }

    // 4. 切換翻譯顯示
    function toggleZh() {
        const zhBox = document.getElementById('displayZh');
        zhBox.style.display = (zhBox.style.display === 'block') ? 'none' : 'block';
    }

    // 5. 處理測驗提交
    function processQuiz() {
        if (!currentQuizData) return;
        
        let score = 0;
        const total = currentQuizData.questions.length;

        currentQuizData.questions.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const fb = document.getElementById(`feedback-${i}`);
            fb.style.display = 'block';

            if (selected) {
                if (parseInt(selected.value) === q.ans) {
                    score++;
                    fb.innerText = "✓ 正確 (Correct)";
                    fb.style.color = "var(--accent-color)";
                } else {
                    fb.innerText = `✗ 錯誤。正確答案是 (${String.fromCharCode(65 + q.ans)})`;
                    fb.style.color = "#e74c3c";
                }
            } else {
                fb.innerText = `請選擇答案。正確答案是 (${String.fromCharCode(65 + q.ans)})`;
                fb.style.color = "#e74c3c";
            }
        });

        document.getElementById('finalScore').innerText = `測驗完成！得分：${score} / ${total}`;
        
        // 滾動到得分處
        document.querySelector('.main-content').scrollTo({
            top: document.querySelector('.main-content').scrollHeight,
            behavior: 'smooth'
        });
    }

    // 啟動執行
    init();
</script>

</body>
</html>
